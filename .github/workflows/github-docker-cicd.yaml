name: Github-Docker Hub MLOps pipeline - LendingClub

env:
  DOCKER_USER: ${{secrets.DOCKER_USER}}
  DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
  REPO_NAME: ${{secrets.REPO_NAME}}

# Déclencheurs : push ou pull_request sur main
on:
  push:
    branches:
    - main
    - feature/ci-cd-black
  pull_request:
    branches:
    - main
    - feature/ci-cd-black

jobs:

  # ── Job 1 : CI (Format → Lint → Test) ─────────────────────────────────────
  ci_pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline   # tout se passe dans le dossier pipeline/

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format Check (black)
        run: |
          black --check --verbose .

      - name: Lint (pylint)
        run: |
          pylint --disable=R,C,W0621,W0702,W1514 credit_app_mlops.py

      - name: Test (pytest)
        run: |
          python -m pytest -vv test.py

  # ── Job 2 : CD (Docker build → Docker Hub push) ───────────────────────────
  cd_pipeline:
    runs-on: ubuntu-latest
    needs: [ci_pipeline]          # ne se déclenche que si le CI passe
    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USER }}" --password-stdin

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d--%M-%S')" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag ${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:${{ steps.date.outputs.date }}

      - name: Docker push
        run: docker push ${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:${{ steps.date.outputs.date }}
