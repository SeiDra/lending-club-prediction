
[tool.black]
line-length = 100          
target-version = ["py310"] 
magic-trailing-comma = true
include = '\.pyi?$'
extend-exclude = '''
/(
  # Dossiers à ignorer
  \.git
  | \.venv
  | __pycache__
  | mlruns
  | DATA
  | \.ipynb_checkpoints
)/
'''
 
# ── pytest (pour éviter un pyproject.toml séparé) ──────────────────────────
[tool.pytest.ini_options]
testpaths = ["pipeline"]
python_files = ["test.py"]